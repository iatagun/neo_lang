# FluidLM configuration
# Tüm hiper-parametreler burada — kod içinde sabit değer yok.

model:
  vocab_size: null          # otomatik (eğitim verisinden belirlenir)
  d_model: 256
  n_layers: 12
  max_seq_len: 512
  nu: 0.01                  # başlangıç viskozitesi (her katman öğrenir)
  dt: 0.10                  # başlangıç zaman adımı (her katman öğrenir)
  integrator: "rk4"         # "euler" veya "rk4"
  convergence_threshold: 1.0e-4
  min_steps: 3
  dropout: 0.1

training:
  epochs: 100
  batch_size: 32
  seq_len: 128
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  lr_schedule: "cosine"     # "cosine" veya "constant"
  warmup_steps: 200

adaptive:
  enabled: true             # üretim sırasında adaptif derinlik kullan
  min_steps: 3              # en az kaç katman çalıştır
  convergence_threshold: 1.0e-4

# Fiziksel parametrelerin yorumu:
#   nu  (viskozite) → yüksek = agresif düzleştirme = daha az "attention" efekti
#   dt  (zaman adımı) → büyük = daha fazla evrim per katman (dikkatli seç)
#   integrator rk4 → 4× maliyet ama çok daha kararlı, büyük dt'ye izin verir
